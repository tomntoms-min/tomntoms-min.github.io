<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>슈식 제철한끼 가게</title>
    <style>
      :root {
        --ink: #2b2118;
        --muted: #7b6d5e;
        --paper: #fff7e9;
        --panel: #fffdf7;
        --line: #ead8be;
        --accent: #e35d45;
        --accent2: #f6b23b;
        --good: #2f9e63;
        --bad: #d64e4e;
        --cook: #3d8bcc;
        --ready: #2f9e63;
        --burn: #4a3024;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        background:
          linear-gradient(rgba(120, 86, 46, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(120, 86, 46, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 16% 10%, rgba(246, 178, 59, 0.28), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(227, 93, 69, 0.18), transparent 30%),
          #fff3df;
        background-size: 34px 34px, 34px 34px, auto, auto, auto;
        font-family:
          Pretendard,
          "Noto Sans KR",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1200px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
      }

      .kicker {
        margin: 0 0 5px;
        color: var(--accent);
        font-size: 0.88rem;
        font-weight: 950;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.85rem, 4vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .hud {
        display: grid;
        grid-template-columns: repeat(5, minmax(70px, 1fr));
        gap: 8px;
        min-width: min(620px, 100%);
      }

      .metric,
      .card,
      .station,
      .tray {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 247, 0.95);
        box-shadow: 0 12px 26px rgba(77, 47, 23, 0.1);
      }

      .metric {
        padding: 9px 11px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 850;
      }

      .metric strong {
        display: block;
        margin-top: 3px;
        font-size: 1.25rem;
        line-height: 1;
      }

      .game {
        display: grid;
        grid-template-columns: minmax(320px, 420px) 1fr;
        gap: 12px;
      }

      .left,
      .right {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .card {
        padding: 14px;
      }

      .customer {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
      }

      .face {
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #ffe0ba;
        font-size: 2.35rem;
        box-shadow: inset 0 0 0 2px rgba(43, 33, 24, 0.08);
      }

      .order-title {
        margin: 0;
        font-size: 1.42rem;
        line-height: 1.1;
      }

      .order-copy {
        margin: 6px 0 0;
        color: var(--muted);
        font-weight: 780;
        line-height: 1.35;
      }

      .patience {
        margin-top: 12px;
      }

      .bar {
        height: 12px;
        border-radius: 999px;
        background: #f0dfc4;
        overflow: hidden;
      }

      .fill {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--good), var(--accent2));
        transition: width 120ms linear;
      }

      .order-list,
      .tray-slots {
        display: grid;
        gap: 8px;
      }

      .need,
      .slot {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        min-height: 43px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 8px 10px;
      }

      .need.done,
      .slot.filled {
        background: #edf9e9;
        border-color: rgba(47, 158, 99, 0.35);
      }

      .label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .name {
        font-weight: 950;
        word-break: keep-all;
      }

      .check {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #f1e2c9;
        color: var(--muted);
        font-weight: 950;
      }

      .done .check,
      .filled .check {
        background: var(--good);
        color: #fff;
      }

      .stations {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 10px;
      }

      .station {
        min-height: 210px;
        padding: 12px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        cursor: pointer;
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      .station:hover {
        transform: translateY(-1px);
      }

      .station.cooking {
        border-color: rgba(61, 139, 204, 0.55);
        background: #f1f8ff;
      }

      .station.ready {
        border-color: rgba(47, 158, 99, 0.65);
        background: #effbec;
        animation: pulse 620ms ease-in-out infinite alternate;
      }

      .station.burned {
        border-color: rgba(74, 48, 36, 0.7);
        background: #f2e7df;
      }

      .station-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .station-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 950;
      }

      .station-icon {
        font-size: 1.45rem;
      }

      .pot {
        display: grid;
        place-items: center;
        min-height: 92px;
        border-radius: 8px;
        background: #f7ead4;
        border: 1px solid rgba(43, 33, 24, 0.08);
      }

      .food-emoji {
        font-size: 2.6rem;
        filter: drop-shadow(0 8px 12px rgba(88, 57, 28, 0.16));
      }

      .station-status {
        min-height: 38px;
        color: var(--muted);
        font-weight: 850;
        line-height: 1.25;
        text-align: center;
      }

      .cookbar {
        height: 10px;
        border-radius: 999px;
        background: #ecdcc4;
        overflow: hidden;
      }

      .cookfill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: var(--cook);
      }

      .station.ready .cookfill {
        background: var(--ready);
      }

      .station.burned .cookfill {
        background: var(--burn);
      }

      .tray {
        padding: 14px;
      }

      .tray-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .tray-top h2 {
        margin: 0;
        font-size: 1.18rem;
      }

      .tray-score {
        color: var(--muted);
        font-weight: 900;
      }

      .message {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 12px;
        color: var(--muted);
        font-weight: 850;
        line-height: 1.35;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .primary,
      .ghost {
        min-height: 48px;
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        font-weight: 950;
      }

      .primary {
        background: var(--ink);
        color: #fff;
      }

      .ghost {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }

      .primary:disabled,
      .ghost:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(43, 33, 24, 0.42);
        backdrop-filter: blur(8px);
        z-index: 20;
      }

      .overlay.show {
        display: grid;
      }

      .modal {
        width: min(480px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
        text-align: center;
        box-shadow: 0 22px 54px rgba(43, 33, 24, 0.24);
      }

      .modal h2 {
        margin: 0 0 10px;
        font-size: 1.75rem;
      }

      .modal p {
        margin: 0 0 18px;
        color: var(--muted);
        font-weight: 800;
        line-height: 1.48;
      }

      .modal .primary {
        width: 100%;
      }

      @keyframes pulse {
        from {
          box-shadow: 0 12px 26px rgba(77, 47, 23, 0.1);
        }
        to {
          box-shadow: 0 0 0 4px rgba(47, 158, 99, 0.18), 0 12px 26px rgba(77, 47, 23, 0.1);
        }
      }

      @media (max-width: 980px) {
        .top,
        .game {
          grid-template-columns: 1fr;
        }

        .hud {
          min-width: 0;
        }

        .stations {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 10px;
        }

        .hud {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .stations,
        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div>
          <p class="kicker">슈의 라면가게 감성 패러디 · PPT 사계절 식단 반영</p>
          <h1>슈식 제철한끼 가게</h1>
        </div>
        <section class="hud" aria-label="게임 상태">
          <div class="metric"><span>매출</span><strong id="score">0</strong></div>
          <div class="metric"><span>남은 시간</span><strong id="time">120</strong></div>
          <div class="metric"><span>손님</span><strong id="served">0</strong></div>
          <div class="metric"><span>콤보</span><strong id="combo">0</strong></div>
          <div class="metric"><span>실수</span><strong id="mistakes">0/5</strong></div>
        </section>
      </header>

      <section class="game">
        <aside class="left">
          <section class="card">
            <div class="customer">
              <div class="face" id="customerFace">🙂</div>
              <div>
                <h2 class="order-title" id="orderTitle">봄 제철 한 끼</h2>
                <p class="order-copy" id="orderCopy">손님이 주문을 기다립니다.</p>
              </div>
            </div>
            <div class="patience">
              <div class="bar"><div class="fill" id="patienceFill"></div></div>
            </div>
          </section>

          <section class="card">
            <div class="order-list" id="orderList"></div>
          </section>

          <section class="card">
            <div class="message" id="message">시작하면 첫 손님이 들어옵니다.</div>
          </section>

          <section class="controls">
            <button class="primary" id="startButton" type="button">시작</button>
            <button class="ghost" id="serveButton" type="button">서빙</button>
            <button class="ghost" id="trashButton" type="button">식판 비우기</button>
          </section>
        </aside>

        <section class="right">
          <section class="stations" id="stations"></section>

          <section class="tray">
            <div class="tray-top">
              <h2>현재 식판</h2>
              <span class="tray-score" id="trayScore">0 / 5</span>
            </div>
            <div class="tray-slots" id="traySlots"></div>
          </section>
        </section>
      </section>
    </main>

    <div class="overlay show" id="startOverlay">
      <div class="modal">
        <h2>제철 한끼 가게 오픈</h2>
        <p>조리대를 눌러 요리를 시작하고, 초록색 완성 타이밍에 다시 눌러 식판에 담으세요. 너무 늦으면 탑니다.</p>
        <button class="primary" id="overlayStart" type="button">가게 열기</button>
      </div>
    </div>

    <div class="overlay" id="endOverlay">
      <div class="modal">
        <h2 id="endTitle">영업 종료</h2>
        <p id="endText">오늘 매출 0원</p>
        <button class="primary" id="restartButton" type="button">다시 영업</button>
      </div>
    </div>

    <script>
      "use strict";

      const SLOTS = [
        { key: "main", label: "메인", station: "불판", icon: "🔥", cook: 3600, ready: 3300 },
        { key: "rice", label: "밥", station: "밥솥", icon: "🍚", cook: 2600, ready: 3700 },
        { key: "soup", label: "국", station: "냄비", icon: "🥣", cook: 3300, ready: 3400 },
        { key: "side", label: "반찬", station: "무침대", icon: "🥬", cook: 2100, ready: 4300 },
        { key: "dessert", label: "후식", station: "과일대", icon: "🍓", cook: 1500, ready: 4800 },
      ];

      const MEALS = [
        meal("봄", "🌱", "#76a943", "남 710 kcal · 단백질 49g / 여 560 kcal · 단백질 38g", [
          food("main", "쭈꾸미볶음", "🐙"),
          food("rice", "잡곡밥", "🍚"),
          food("soup", "바지락냉이국", "🥣"),
          food("side", "달래무침", "🥬"),
          food("dessert", "딸기", "🍓"),
        ]),
        meal("여름", "☀️", "#3e9bd2", "남 765 kcal · 단백질 43g / 여 623 kcal · 단백질 36g", [
          food("main", "오징어·가지볶음", "🦑"),
          food("rice", "잡곡밥", "🍚"),
          food("soup", "오이냉국", "🥒"),
          food("side", "토마토", "🍅"),
          food("dessert", "수박", "🍉"),
        ]),
        meal("가을", "🍁", "#c7832f", "남 820 kcal · 단백질 42g / 여 720 kcal · 단백질 37g", [
          food("main", "고등어구이", "🐟"),
          food("rice", "백미밥", "🍚"),
          food("soup", "배추된장국", "🥣"),
          food("side", "버섯볶음", "🍄"),
          food("dessert", "단호박·사과", "🍎"),
        ]),
        meal("겨울", "❄️", "#d6655e", "남 약 835 kcal · 단백질 42g / 여 약 650 kcal · 단백질 34g", [
          food("main", "고등어구이", "🐟"),
          food("rice", "현미밥", "🍚"),
          food("soup", "굴미역국", "🦪"),
          food("side", "시금치나물·김치", "🥬"),
          food("dessert", "감귤", "🍊"),
        ]),
      ];

      const CUSTOMERS = ["🙂", "😋", "🤤", "😮", "🥹", "😎", "😆"];
      const BURN_LIMIT = 5600;

      const els = {
        score: document.getElementById("score"),
        time: document.getElementById("time"),
        served: document.getElementById("served"),
        combo: document.getElementById("combo"),
        mistakes: document.getElementById("mistakes"),
        customerFace: document.getElementById("customerFace"),
        orderTitle: document.getElementById("orderTitle"),
        orderCopy: document.getElementById("orderCopy"),
        patienceFill: document.getElementById("patienceFill"),
        orderList: document.getElementById("orderList"),
        stations: document.getElementById("stations"),
        traySlots: document.getElementById("traySlots"),
        trayScore: document.getElementById("trayScore"),
        message: document.getElementById("message"),
        startButton: document.getElementById("startButton"),
        overlayStart: document.getElementById("overlayStart"),
        restartButton: document.getElementById("restartButton"),
        serveButton: document.getElementById("serveButton"),
        trashButton: document.getElementById("trashButton"),
        startOverlay: document.getElementById("startOverlay"),
        endOverlay: document.getElementById("endOverlay"),
        endTitle: document.getElementById("endTitle"),
        endText: document.getElementById("endText"),
      };

      const state = {
        running: false,
        score: 0,
        served: 0,
        combo: 0,
        mistakes: 0,
        timeMs: 120000,
        order: MEALS[0],
        patienceMs: 26000,
        maxPatienceMs: 26000,
        tray: {},
        stations: {},
        timer: null,
        last: 0,
      };

      function meal(season, icon, color, nutrition, foods) {
        return { season, icon, color, nutrition, foods };
      }

      function food(slot, name, icon) {
        return { slot, name, icon };
      }

      function startGame() {
        state.running = true;
        state.score = 0;
        state.served = 0;
        state.combo = 0;
        state.mistakes = 0;
        state.timeMs = 120000;
        state.tray = {};
        resetStations();
        newOrder();
        els.startOverlay.classList.remove("show");
        els.endOverlay.classList.remove("show");
        els.message.textContent = "주문 확인! 조리대를 눌러 동시에 요리를 돌리세요.";
        state.last = performance.now();
        clearInterval(state.timer);
        state.timer = window.setInterval(tick, 100);
        render();
      }

      function resetStations() {
        state.stations = {};
        for (const slot of SLOTS) {
          state.stations[slot.key] = {
            slot: slot.key,
            status: "idle",
            elapsed: 0,
          };
        }
      }

      function newOrder() {
        state.order = MEALS[state.served % MEALS.length];
        state.maxPatienceMs = Math.max(13500, 27000 - state.served * 750);
        state.patienceMs = state.maxPatienceMs;
        state.tray = {};
        resetStations();
        document.documentElement.style.setProperty("--accent", state.order.color);
        els.customerFace.textContent = CUSTOMERS[state.served % CUSTOMERS.length];
      }

      function tick() {
        if (!state.running) return;
        const now = performance.now();
        const dt = Math.min(300, now - state.last);
        state.last = now;
        state.timeMs -= dt;
        state.patienceMs -= dt;

        for (const station of Object.values(state.stations)) {
          if (station.status === "cooking" || station.status === "ready") {
            station.elapsed += dt;
            const cfg = slotConfig(station.slot);
            if (station.status === "cooking" && station.elapsed >= cfg.cook) {
              station.status = "ready";
              els.message.textContent = `${cfg.station} 완성! 타기 전에 담으세요.`;
            }
            if (station.elapsed >= cfg.cook + cfg.ready) {
              station.status = "burned";
              state.combo = 0;
              els.message.textContent = `${cfg.station} 음식이 탔습니다. 버리고 다시 조리하세요.`;
            }
          }
        }

        if (state.patienceMs <= 0) {
          state.mistakes += 1;
          state.combo = 0;
          state.score = Math.max(0, state.score - 350);
          els.message.textContent = "손님이 기다리다 나갔습니다. 다음 주문!";
          if (state.mistakes >= 5) {
            finishGame();
          } else {
            newOrder();
          }
        }

        if (state.timeMs <= 0) finishGame();
        render();
      }

      function clickStation(slotKey) {
        if (!state.running) return;
        const station = state.stations[slotKey];
        const cfg = slotConfig(slotKey);
        const orderFood = orderFoodFor(slotKey);

        if (station.status === "idle") {
          station.status = "cooking";
          station.elapsed = 0;
          els.message.textContent = `${cfg.station}에서 ${orderFood.name} 조리 시작!`;
          render();
          return;
        }

        if (station.status === "cooking") {
          els.message.textContent = "아직 덜 익었습니다. 초록색 완성 타이밍까지 기다리세요.";
          state.combo = Math.max(0, state.combo - 1);
          return;
        }

        if (station.status === "ready") {
          state.tray[slotKey] = { ...orderFood, quality: stationQuality(station, cfg) };
          station.status = "idle";
          station.elapsed = 0;
          const q = state.tray[slotKey].quality;
          els.message.textContent = q > 0.85 ? `${orderFood.name} 완벽한 타이밍!` : `${orderFood.name} 담기 완료.`;
          render();
          return;
        }

        if (station.status === "burned") {
          station.status = "idle";
          station.elapsed = 0;
          state.mistakes += 1;
          state.score = Math.max(0, state.score - 120);
          els.message.textContent = "탄 음식은 버렸습니다. 같은 조리대를 다시 누르세요.";
          if (state.mistakes >= 5) finishGame();
          render();
        }
      }

      function stationQuality(station, cfg) {
        const readyElapsed = Math.max(0, station.elapsed - cfg.cook);
        return Math.max(0.45, 1 - readyElapsed / BURN_LIMIT);
      }

      function serve() {
        if (!state.running) return;
        const count = Object.keys(state.tray).length;
        if (count < SLOTS.length) {
          els.message.textContent = `아직 ${SLOTS.length - count}개가 부족합니다.`;
          return;
        }

        const quality = Object.values(state.tray).reduce((sum, item) => sum + item.quality, 0) / SLOTS.length;
        const patienceRatio = Math.max(0, state.patienceMs / state.maxPatienceMs);
        const base = 900;
        const qualityBonus = Math.round(quality * 420);
        const speedBonus = Math.round(patienceRatio * 360);
        const comboBonus = state.combo * 90;
        const earned = base + qualityBonus + speedBonus + comboBonus;

        state.score += earned;
        state.served += 1;
        state.combo += 1;
        state.timeMs += 5000;
        els.message.textContent = `서빙 성공! +${earned}원 · 시간 +5초`;
        newOrder();
        render();
      }

      function clearTray() {
        if (!state.running) return;
        state.tray = {};
        state.combo = 0;
        els.message.textContent = "식판을 비웠습니다.";
        render();
      }

      function finishGame() {
        if (!state.running) return;
        state.running = false;
        clearInterval(state.timer);
        els.endTitle.textContent = state.score >= 9000 ? "제철 가게 대박" : state.score >= 5500 ? "영업 성공" : "영업 종료";
        els.endText.textContent = `오늘 매출 ${state.score.toLocaleString("ko-KR")}원 · 손님 ${state.served}명`;
        els.endOverlay.classList.add("show");
        render();
      }

      function slotConfig(slotKey) {
        return SLOTS.find((slot) => slot.key === slotKey);
      }

      function orderFoodFor(slotKey) {
        return state.order.foods.find((item) => item.slot === slotKey);
      }

      function render() {
        els.score.textContent = `${state.score.toLocaleString("ko-KR")}원`;
        els.time.textContent = Math.max(0, Math.ceil(state.timeMs / 1000)).toString();
        els.served.textContent = `${state.served}명`;
        els.combo.textContent = state.combo.toString();
        els.mistakes.textContent = `${state.mistakes}/5`;
        els.orderTitle.textContent = `${state.order.icon} ${state.order.season} 제철 한 끼`;
        els.orderCopy.textContent = state.order.nutrition;
        els.patienceFill.style.width = `${Math.max(0, (state.patienceMs / state.maxPatienceMs) * 100)}%`;
        els.serveButton.disabled = !state.running;
        els.trashButton.disabled = !state.running;
        renderOrderList();
        renderStations();
        renderTray();
      }

      function renderOrderList() {
        els.orderList.innerHTML = "";
        for (const item of state.order.foods) {
          const done = Boolean(state.tray[item.slot]);
          const row = document.createElement("div");
          row.className = `need ${done ? "done" : ""}`;
          row.innerHTML = `
            <span class="label">${slotConfig(item.slot).label}</span>
            <span class="name">${item.icon} ${item.name}</span>
            <span class="check">${done ? "✓" : ""}</span>
          `;
          els.orderList.appendChild(row);
        }
      }

      function renderStations() {
        els.stations.innerHTML = "";
        for (const cfg of SLOTS) {
          const station = state.stations[cfg.key];
          const item = orderFoodFor(cfg.key);
          const progress = stationProgress(station, cfg);
          const button = document.createElement("button");
          button.type = "button";
          button.className = `station ${station.status}`;
          button.innerHTML = `
            <div class="station-head">
              <h3 class="station-title">${cfg.station}</h3>
              <span class="station-icon">${cfg.icon}</span>
            </div>
            <div class="pot">
              <span class="food-emoji">${station.status === "idle" ? item.icon : station.status === "burned" ? "💥" : item.icon}</span>
            </div>
            <div>
              <div class="station-status">${stationText(station, cfg, item)}</div>
              <div class="cookbar"><div class="cookfill" style="width:${progress}%"></div></div>
            </div>
          `;
          button.addEventListener("click", () => clickStation(cfg.key));
          els.stations.appendChild(button);
        }
      }

      function stationProgress(station, cfg) {
        if (station.status === "idle") return 0;
        if (station.status === "burned") return 100;
        return Math.max(0, Math.min(100, (station.elapsed / (cfg.cook + cfg.ready)) * 100));
      }

      function stationText(station, cfg, item) {
        if (station.status === "idle") return `${item.name} 시작`;
        if (station.status === "cooking") return "조리 중...";
        if (station.status === "ready") return "완성! 지금 담기";
        return "탐! 눌러서 버리기";
      }

      function renderTray() {
        els.traySlots.innerHTML = "";
        const filled = Object.keys(state.tray).length;
        els.trayScore.textContent = `${filled} / ${SLOTS.length}`;
        for (const cfg of SLOTS) {
          const item = state.tray[cfg.key];
          const row = document.createElement("div");
          row.className = `slot ${item ? "filled" : ""}`;
          row.innerHTML = `
            <span class="label">${cfg.label}</span>
            <span class="name">${item ? `${item.icon} ${item.name}` : "비어 있음"}</span>
            <span class="check">${item ? "✓" : ""}</span>
          `;
          els.traySlots.appendChild(row);
        }
      }

      els.startButton.addEventListener("click", startGame);
      els.overlayStart.addEventListener("click", startGame);
      els.restartButton.addEventListener("click", startGame);
      els.serveButton.addEventListener("click", serve);
      els.trashButton.addEventListener("click", clearTray);

      resetStations();
      render();
    </script>
  </body>
</html>
